<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoArch Agent · Modo Claro</title>
  <!-- Fuente moderna y limpia -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    /* Reset básico y estilos globales */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #EEF0F3; /* gris tenue con matiz frío */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      margin: 0;
      line-height: 1.5;
      color: #0B1120;
    }

    /* Tarjeta principal que flota sobre el fondo gris */
    .card {
      max-width: 820px;
      width: 100%;
      background: #FFFFFF;
      border-radius: 2rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
      transition: box-shadow 0.2s ease;
    }

    /* Encabezado: logo + etiqueta live */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .monogram {
      background: linear-gradient(145deg, #1E3A8A, #5B21B6);
      color: white;
      font-weight: 800;
      font-size: 1.4rem;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 8px rgba(30, 58, 138, 0.2);
    }

    .brand {
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: -0.3px;
      color: #0B1120;
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #E9F5F0;
      color: #0A6E4A;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 1rem 0.4rem 0.9rem;
      border-radius: 40px;
      border: 1px solid #C6E3D6;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .badge-live .check {
      color: #059669;
      font-weight: 800;
      font-size: 1rem;
    }

    /* Contenido principal */
    .main-content {
      margin-bottom: 2.2rem;
    }

    .title {
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      color: #0B1120;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .description {
      font-size: 1.1rem;
      color: #374151;
      max-width: 90%;
      margin-bottom: 1.2rem;
      font-weight: 400;
    }

    .commission-badge {
      display: inline-flex;
      align-items: center;
      background: #FEF3C7;
      color: #92400E;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.3rem 1.1rem;
      border-radius: 40px;
      border: 1px solid #FDE68A;
      letter-spacing: -0.2px;
      box-shadow: 0 1px 3px rgba(180, 120, 20, 0.08);
    }

    .commission-badge strong {
      font-weight: 800;
      color: #B45309;
      margin-right: 2px;
    }

    /* Acciones (botones) */
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      margin-bottom: 2.2rem;
    }

    .btn-primary {
      background: #2563EB;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.75rem 2.2rem;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      background: #1D4ED8;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.30);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: #1F2937;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem 1.8rem;
      border: 1.5px solid #D1D5DB;
      border-radius: 60px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s, border-color 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-secondary:hover {
      background: #F3F4F6;
      border-color: #9CA3AF;
    }

    /* Pie de características */
    .features {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.3rem 0.6rem;
      padding-top: 1.5rem;
      border-top: 1px solid #E5E7EB;
      font-size: 0.95rem;
      color: #6B7280;
    }

    .features .dot {
      color: #9CA3AF;
      font-weight: 300;
      margin: 0 2px;
    }

    .features .highlight {
      color: #2563EB;
      font-weight: 600;
    }

    .features .highlight-green {
      color: #059669;
      font-weight: 600;
    }

    /* Ajustes responsivos */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .card {
        padding: 1.8rem 1.5rem;
        border-radius: 1.5rem;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.8rem;
      }
      .title {
        font-size: 1.8rem;
      }
      .description {
        max-width: 100%;
        font-size: 1rem;
      }
      .actions {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-primary,
      .btn-secondary {
        text-align: center;
      }
      .features {
        font-size: 0.85rem;
        gap: 0.2rem 0.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- ENCABEZADO -->
    <header class="header">
      <div class="logo-group">
        <div class="monogram">CA</div>
        <span class="brand">CRYPTOARCH AGENT</span>
      </div>
      <div class="badge-live">
        <span class="check">✔</span> LIVE · FREE · NO SUBSCRIPTIONS
      </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
      <h1 class="title">CryptoArch Agent</h1>
      <p class="description">
        The non-custodial Telegram analysis bot with real whale alerts on BTC, ETH, SOL, MATIC, and ARB.
      </p>
      <div class="commission-badge">
        <strong>Commission from 0.3%</strong>
      </div>
    </div>

    <!-- ACCIONES -->
    <div class="actions">
      <a href="#" class="btn-primary">Try now</a>
      <a href="#" class="btn-secondary">View commissions</a>
    </div>

    <!-- PIE: CARACTERÍSTICAS -->
    <div class="features">
      <span>No sign-up</span>
      <span class="dot">·</span>
      <span>Non-custodial</span>
      <span class="dot">·</span>
      <span class="highlight-green">Free</span>
      <span class="dot">·</span>
      <span>No subscriptions</span>
      <span class="dot">·</span>
      <span class="highlight">14‑day trial</span>
    </div>

  </div>

</body>
</html>
